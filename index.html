<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Centrax — Project Board</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f12;--surface:#141720;--surface2:#1c2030;--border:#ffffff0f;--border2:#ffffff1a;--text:#e8eaf0;--muted:#6b7280;--accent:#3b82f6;--accent-dim:#3b82f620;--green:#22c55e;--green-dim:#22c55e18;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--blue:#3b82f6;--font-sans:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;--radius:8px;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-weight:600;font-size:14px;}
.logo-sub{font-size:10px;color:var(--muted);font-family:var(--font-mono);}
.token-wrap{position:relative;}
.token-wrap label{font-size:10px;color:var(--muted);font-family:var(--font-mono);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.token-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--font-mono);font-size:10px;padding:7px 65px 7px 9px;outline:none;transition:border-color .15s;}
.token-input:focus{border-color:var(--accent);}
.token-input::placeholder{color:var(--muted);}
.connect-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:10px;font-weight:500;padding:4px 9px;cursor:pointer;}
.status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:8px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sidebar-filters{padding:12px;border-bottom:1px solid var(--border);flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;}
.filter-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:10px;}
.filter-label:first-child{margin-top:0;}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.assignee-list{display:flex;flex-direction:column;gap:2px;}
.a-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--muted);background:none;border:1px solid transparent;width:100%;text-align:left;transition:all .15s;}
.a-btn:hover{background:var(--surface2);color:var(--text);}
.a-btn.active{background:var(--accent-dim);color:var(--accent);border-color:#3b82f630;}
.a-avatar{width:20px;height:20px;border-radius:50%;}
.a-count{margin-left:auto;font-family:var(--font-mono);font-size:10px;background:var(--surface2);padding:1px 5px;border-radius:10px;}
.status-filters{display:flex;flex-direction:column;gap:2px;}
.s-btn{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;font-size:11px;color:var(--muted);background:none;border:1px solid transparent;width:100%;text-align:left;transition:all .15s;font-family:var(--font-mono);}
.s-btn:hover{background:var(--surface2);color:var(--text);}
.s-btn.active{background:var(--accent-dim);color:var(--accent);border-color:#3b82f630;}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.board-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.board-title{font-size:14px;font-weight:500;}
.stats{display:flex;gap:12px;}
.stat{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.stat span{color:var(--text);}
.board{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 20px;display:flex;gap:16px;}
.col{min-width:300px;width:300px;display:flex;flex-direction:column;overflow:hidden;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid;}
.col-title{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.6px;}
.col-badge{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:10px;}
.cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px;}
.cards::-webkit-scrollbar{width:3px;}
.cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:all .15s;}
.card:hover{border-color:var(--border2);background:var(--surface2);}
.card-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:4px;}
.card-title{font-size:12px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:8px;}
.card-assignees{display:flex;gap:4px;flex-wrap:wrap;}
.ap{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:2px 6px;font-size:10px;color:var(--muted);font-family:var(--font-mono);}
.ap img{width:12px;height:12px;border-radius:50%;}
.empty{font-size:12px;color:var(--muted);padding:12px 0;text-align:center;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;width:100%;}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#ef444418;border:1px solid #ef444430;color:var(--red);font-size:11px;padding:8px 10px;border-radius:var(--radius);margin:10px 0;font-family:var(--font-mono);}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div><div class="logo-text">Centrax Board</div><div class="logo-sub">healthygrid · project #1</div></div>
      </div>
      <div class="token-wrap">
        <label>GitHub PAT</label>
        <input class="token-input" type="password" id="tokenInput" placeholder="ghp_..." />
        <button class="connect-btn" onclick="connect()">Load</button>
      </div>
      <div class="status" id="statusEl" style="display:none;">
        <div class="status-dot"></div>
        <span id="statusText">Connected</span>
      </div>
    </div>
    <div class="sidebar-filters">
      <div class="filter-label">Search</div>
      <input class="search-input" type="text" id="searchInput" placeholder="Issue title or number..." oninput="applyFilters()" />
      <div class="filter-label">Status</div>
      <div class="status-filters" id="statusFilters"><div style="font-size:11px;color:var(--muted);">Connect to load</div></div>
      <div class="filter-label">Assignee</div>
      <div class="assignee-list" id="assigneeList"><div style="font-size:11px;color:var(--muted);">Connect to load</div></div>
    </div>
  </div>
  <div class="main">
    <div class="board-header">
      <span class="board-title" id="boardTitle">Centrax — Project Board</span>
      <div class="stats" id="statsEl"></div>
    </div>
    <div class="board" id="board">
      <div style="display:flex;align-items:center;justify-content:center;width:100%;color:var(--muted);font-size:13px;">Enter your GitHub PAT to load the project board.</div>
    </div>
  </div>
</div>
<script>
const OWNER='healthygrid',PROJECT_NUM=1;
let allIssues=[],activeAssignee=null,activeStatus=null;

const STATUS_COLORS={
  'In Progress':    {dot:'#3b82f6', border:'#3b82f640', title:'#3b82f6', badge:'#3b82f620'},
  'Done QA in Dev': {dot:'#f59e0b', border:'#f59e0b40', title:'#f59e0b', badge:'#f59e0b20'},
  'Done QA in Staging':{dot:'#22c55e',border:'#22c55e40',title:'#22c55e',badge:'#22c55e20'},
  'High Priority Backlog':{dot:'#ef4444',border:'#ef444440',title:'#ef4444',badge:'#ef444420'},
  'default':        {dot:'#6b7280', border:'#6b728040', title:'#6b7280', badge:'#6b728020'},
};

function colColor(status){return STATUS_COLORS[status]||STATUS_COLORS['default'];}

const QUERY=`{ user(login:"${OWNER}") { projectV2(number:${PROJECT_NUM}) { title items(first:100) { nodes { fieldValues(first:10) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2FieldCommon { name } } } ... on ProjectV2ItemFieldTextValue { text field { ... on ProjectV2FieldCommon { name } } } } } content { ... on Issue { number title state assignees(first:5) { nodes { login avatarUrl } } } } } } } } }`;

async function connect(){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token)return;
  document.getElementById('board').innerHTML='<div class="loader"><div class="spinner"></div></div>';
  try{
    const res=await fetch('https://api.github.com/graphql',{method:'POST',headers:{Authorization:`bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({query:QUERY})});
    const json=await res.json();
    if(json.errors)throw new Error(json.errors[0].message);
    const project=json.data.user.projectV2;
    document.getElementById('boardTitle').textContent=project.title+' — Project Board';
    allIssues=project.items.nodes.filter(n=>n.content&&n.content.number).map(n=>{
      const status=(n.fieldValues.nodes.find(f=>f.field?.name==='Status')||{}).name||'No Status';
      return{number:n.content.number,title:n.content.title,state:n.content.state,status,assignees:n.content.assignees.nodes};
    });
    buildStatusFilters();
    buildAssignees();
    applyFilters();
    document.getElementById('statusEl').style.display='flex';
    document.getElementById('statusText').textContent=`${allIssues.length} items loaded`;
  }catch(e){document.getElementById('board').innerHTML=`<div class="err" style="margin:20px;">Error: ${e.message}</div>`;}
}

function buildStatusFilters(){
  const statuses=[...new Set(allIssues.map(i=>i.status))];
  const counts={};
  allIssues.forEach(i=>{counts[i.status]=(counts[i.status]||0)+1;});
  document.getElementById('statusFilters').innerHTML=
    `<button class="s-btn active" onclick="setStatus(null,this)"><span class="s-dot" style="background:#6b7280"></span>All <span class="a-count">${allIssues.length}</span></button>`+
    statuses.map(s=>{
      const c=colColor(s);
      return `<button class="s-btn" onclick="setStatus('${s}',this)"><span class="s-dot" style="background:${c.dot}"></span>${s}<span class="a-count">${counts[s]}</span></button>`;
    }).join('');
}

function buildAssignees(){
  const counts={};
  allIssues.forEach(i=>i.assignees.forEach(a=>{counts[a.login]=counts[a.login]||{login:a.login,avatar:a.avatarUrl,count:0};counts[a.login].count++;}));
  const sorted=Object.values(counts).sort((a,b)=>b.count-a.count);
  document.getElementById('assigneeList').innerHTML=
    `<button class="a-btn active" onclick="setAssignee(null,this)"><span>👥</span>All<span class="a-count">${allIssues.length}</span></button>`+
    sorted.map(a=>`<button class="a-btn" onclick="setAssignee('${a.login}',this)"><img class="a-avatar" src="${a.avatar}"/>${a.login}<span class="a-count">${a.count}</span></button>`).join('');
}

function setStatus(status,btn){
  activeStatus=status;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilters();
}

function setAssignee(login,btn){
  activeAssignee=login;
  document.querySelectorAll('.a-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilters();
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=allIssues.filter(i=>{
    const qMatch=!q||i.title.toLowerCase().includes(q)||String(i.number).includes(q);
    const aMatch=!activeAssignee||i.assignees.some(a=>a.login===activeAssignee);
    const sMatch=!activeStatus||i.status===activeStatus;
    return qMatch&&aMatch&&sMatch;
  });

  const cols={};
  filtered.forEach(i=>{if(!cols[i.status])cols[i.status]=[];cols[i.status].push(i);});

  // Order: In Progress first, then others alphabetically
  const order=['In Progress','Done QA in Dev','Done QA in Staging','High Priority Backlog'];
  const allStatuses=[...new Set([...order.filter(s=>cols[s]),...Object.keys(cols).filter(s=>!order.includes(s)).sort()])];

  document.getElementById('statsEl').innerHTML=`<span class="stat">Total <span>${filtered.length}</span></span>`+
    allStatuses.map(s=>`<span class="stat"><span>${(cols[s]||[]).length}</span> ${s}</span>`).join('');

  document.getElementById('board').innerHTML=allStatuses.map(status=>{
    const c=colColor(status);
    const cards=(cols[status]||[]).map(i=>`
      <div class="card" onclick="window.open('https://github.com/${OWNER}/centrax-app/issues/${i.number}','_blank')">
        <div class="card-num">#${i.number}</div>
        <div class="card-title">${esc(i.title)}</div>
        <div class="card-assignees">${i.assignees.map(a=>`<span class="ap"><img src="${a.avatarUrl}"/>${a.login}</span>`).join('')}</div>
      </div>`).join('');
    return `<div class="col">
      <div class="col-header" style="border-color:${c.border};">
        <span class="col-title" style="color:${c.title};">${status}</span>
        <span class="col-badge" style="background:${c.badge};color:${c.title};">${(cols[status]||[]).length}</span>
      </div>
      <div class="cards">${cards||'<div class="empty">No issues</div>'}</div>
    </div>`;
  }).join('');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')connect();});
</script>
</body>
</html>
