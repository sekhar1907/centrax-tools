<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Centrax — GitHub Issues</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #ffffff0f;
    --border2: #ffffff1a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #3b82f6;
    --accent-dim: #3b82f620;
    --green: #22c55e;
    --green-dim: #22c55e18;
    --red: #ef4444;
    --red-dim: #ef444418;
    --amber: #f59e0b;
    --amber-dim: #f59e0b18;
    --purple: #a78bfa;
    --purple-dim: #a78bfa18;
    --font-sans: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  .token-input-wrap { position: relative; }
  .token-input-wrap label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); display: block; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .token-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 8px 70px 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .token-input:focus { border-color: var(--accent); }
  .token-input::placeholder { color: var(--muted); }
  .connect-btn {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: var(--accent); color: #fff; border: none; border-radius: 5px;
    font-size: 11px; font-family: var(--font-sans); font-weight: 500;
    padding: 5px 10px; cursor: pointer; transition: opacity 0.15s;
  }
  .connect-btn:hover { opacity: 0.85; }

  .repo-info {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    margin-top: 10px;
  }
  .repo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .sidebar-nav { padding: 12px 12px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius);
    cursor: pointer; font-size: 13px; color: var(--muted);
    transition: all 0.15s; border: 1px solid transparent;
    background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent)30; }
  .nav-badge {
    margin-left: auto; font-family: var(--font-mono); font-size: 10px;
    background: var(--surface2); color: var(--muted);
    padding: 2px 6px; border-radius: 20px;
  }
  .nav-item.active .nav-badge { background: var(--accent-dim); color: var(--accent); }

  .sidebar-filters { padding: 0 12px 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .filter-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .filter-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-sans);
    font-size: 12px; padding: 7px 10px; outline: none; cursor: pointer;
    margin-bottom: 8px;
  }
  .search-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-sans);
    font-size: 12px; padding: 7px 10px; outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .main { flex: 1; display: flex; overflow: hidden; }

  .issues-panel {
    width: 380px; min-width: 380px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .panel-title { font-weight: 500; font-size: 13px; }
  .count-pill {
    font-family: var(--font-mono); font-size: 10px;
    background: var(--surface2); color: var(--muted);
    padding: 2px 8px; border-radius: 20px;
  }

  .issues-list { flex: 1; overflow-y: auto; }
  .issues-list::-webkit-scrollbar { width: 4px; }
  .issues-list::-webkit-scrollbar-track { background: transparent; }
  .issues-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .issue-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .issue-item:hover { background: var(--surface2); }
  .issue-item.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); }

  .issue-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .issue-num { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .state-dot { width: 6px; height: 6px; border-radius: 50%; }
  .state-dot.open { background: var(--green); }
  .state-dot.closed { background: var(--red); }
  .issue-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; color: var(--text); }
  .issue-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .issue-label { font-size: 10px; padding: 1px 6px; border-radius: 20px; font-family: var(--font-mono); }
  .issue-assignee { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .avatar-sm { width: 18px; height: 18px; border-radius: 50%; }
  .assignee-name { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
  .issue-time { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

  .detail-panel { flex: 1; overflow-y: auto; background: var(--bg); }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .detail-empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; color: var(--muted);
  }
  .detail-empty-icon { font-size: 40px; opacity: 0.3; }

  .detail-content { padding: 28px 32px; max-width: 760px; }

  .detail-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .detail-title-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .detail-title { font-size: 20px; font-weight: 600; line-height: 1.3; letter-spacing: -0.3px; flex: 1; }
  .state-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px;
    font-family: var(--font-mono); white-space: nowrap; margin-top: 3px;
  }
  .state-badge.open { background: var(--green-dim); color: var(--green); border: 1px solid var(--green)30; }
  .state-badge.closed { background: var(--red-dim); color: var(--red); border: 1px solid var(--red)30; }

  .detail-submeta { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
  .detail-labels { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

  .detail-body {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px;
    font-size: 14px; line-height: 1.8; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .detail-body code {
    font-family: var(--font-mono); font-size: 12px;
    background: var(--bg); padding: 1px 5px; border-radius: 4px;
    border: 1px solid var(--border2);
  }

  .section-title {
    font-size: 10px; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); margin-bottom: 12px;
  }

  .sidebar-meta { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .meta-block { flex: 1; min-width: 140px; }

  .assignee-card {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
  }
  .avatar-md { width: 28px; height: 28px; border-radius: 50%; }
  .assignee-login { font-size: 13px; font-weight: 500; }

  .comments-section { margin-top: 8px; }
  .comment-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px;
  }
  .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .comment-author { font-size: 13px; font-weight: 500; }
  .comment-time { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .comment-body { font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-list { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  .load-more-btn {
    width: 100%; padding: 12px; background: none; border: none;
    border-top: 1px solid var(--border); color: var(--accent);
    font-family: var(--font-sans); font-size: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .load-more-btn:hover { background: var(--surface2); }

  .error-bar {
    background: var(--red-dim); border: 1px solid var(--red)30;
    color: var(--red); font-size: 12px; padding: 8px 12px;
    border-radius: var(--radius); margin: 12px 20px;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <div class="logo-text">Centrax Issues</div>
          <div class="logo-sub">healthygrid/centrax-app</div>
        </div>
      </div>
      <div class="token-input-wrap">
        <label>GitHub PAT</label>
        <input class="token-input" type="password" id="tokenInput" placeholder="ghp_..." />
        <button class="connect-btn" onclick="connect()">Connect</button>
      </div>
      <div class="repo-info" id="repoInfo" style="display:none;">
        <div class="repo-dot"></div>
        <span id="repoInfoText">Connected</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <button class="nav-item active" onclick="setFilter('open', this)">
        <span>●</span> Open
        <span class="nav-badge" id="openCount">—</span>
      </button>
      <button class="nav-item" onclick="setFilter('closed', this)">
        <span>○</span> Closed
        <span class="nav-badge" id="closedCount">—</span>
      </button>
      <button class="nav-item" onclick="setFilter('all', this)">
        <span>◈</span> All
        <span class="nav-badge" id="allCount">—</span>
      </button>
    </div>

    <div class="sidebar-filters">
      <div class="filter-label">Assignee</div>
      <select class="filter-select" id="assigneeFilter" onchange="applyFilters()">
        <option value="">All assignees</option>
      </select>
      <input class="search-input" type="text" id="searchInput" placeholder="Search issues..." oninput="applyFilters()" />
    </div>
  </div>

  <div class="main">
    <div class="issues-panel">
      <div class="panel-header">
        <span class="panel-title" id="panelTitle">Issues</span>
        <span class="count-pill" id="visibleCount">—</span>
      </div>
      <div class="issues-list" id="issuesList">
        <div class="empty-list">Connect your GitHub token to get started.</div>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">
        <div class="detail-empty-icon">◈</div>
        <div>Select an issue to view details</div>
      </div>
    </div>
  </div>
</div>

<script>
const REPO = 'healthygrid/centrax-app';
let TOKEN = '';
let allIssues = [];
let currentFilter = 'open';
let currentIssue = null;
let page = 1;
let hasMore = false;

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 2592000) return Math.floor(diff/86400) + 'd ago';
  return Math.floor(diff/2592000) + 'mo ago';
}

function labelStyle(hex) {
  const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b)/255;
  const fg = lum > 0.5 ? '#000' : '#fff';
  return `background:#${hex}; color:${fg};`;
}

function renderIssueItem(issue) {
  const labels = (issue.labels||[]).slice(0,3).map(l =>
    `<span class="issue-label" style="${labelStyle(l.color)}">${l.name}</span>`).join('');
  const assignee = issue.assignees && issue.assignees[0]
    ? `<span class="issue-assignee"><img class="avatar-sm" src="${issue.assignees[0].avatar_url}" /><span class="assignee-name">${issue.assignees[0].login}</span></span>`
    : '';
  return `
    <div class="issue-item ${currentIssue === issue.number ? 'selected' : ''}" onclick="loadDetail(${issue.number})">
      <div class="issue-meta">
        <div class="state-dot ${issue.state}"></div>
        <span class="issue-num">#${issue.number}</span>
        <span class="issue-time">${timeAgo(issue.updated_at)}</span>
      </div>
      <div class="issue-title">${escHtml(issue.title)}</div>
      <div class="issue-footer">${labels}${assignee}</div>
    </div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBody(text) {
  if (!text) return '<em style="color:var(--muted)">No description provided.</em>';
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const assignee = document.getElementById('assigneeFilter').value;
  const filtered = allIssues.filter(i => {
    const stateMatch = currentFilter === 'all' || i.state === currentFilter;
    const qMatch = !q || i.title.toLowerCase().includes(q) || String(i.number).includes(q);
    const aMatch = !assignee || (i.assignees||[]).some(a => a.login === assignee);
    return stateMatch && qMatch && aMatch;
  });

  document.getElementById('visibleCount').textContent = filtered.length;
  const list = document.getElementById('issuesList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-list">No issues found.</div>';
    return;
  }
  list.innerHTML = filtered.map(renderIssueItem).join('');
  if (hasMore) {
    list.innerHTML += `<button class="load-more-btn" onclick="loadMore()">Load more issues</button>`;
  }
}

function setFilter(state, btn) {
  currentFilter = state;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panelTitle').textContent = state === 'all' ? 'All Issues' : state === 'open' ? 'Open Issues' : 'Closed Issues';
  applyFilters();
}

async function ghFetch(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO}${path}`, {
    headers: { Authorization: `token ${TOKEN}`, Accept: 'application/vnd.github+json' }
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return { data: await res.json(), link: res.headers.get('Link')||'' };
}

async function connect() {
  TOKEN = document.getElementById('tokenInput').value.trim();
  if (!TOKEN) return;
  const list = document.getElementById('issuesList');
  list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    page = 1;
    const { data, link } = await ghFetch(`/issues?state=all&per_page=50&page=1`);
    allIssues = data.filter(i => !i.pull_request);
    hasMore = link.includes('rel="next"');

    const open = allIssues.filter(i => i.state==='open').length;
    const closed = allIssues.filter(i => i.state==='closed').length;
    document.getElementById('openCount').textContent = open;
    document.getElementById('closedCount').textContent = closed;
    document.getElementById('allCount').textContent = allIssues.length;

    const seen = new Set();
    const sel = document.getElementById('assigneeFilter');
    sel.innerHTML = '<option value="">All assignees</option>';
    allIssues.forEach(i => (i.assignees||[]).forEach(a => {
      if (!seen.has(a.login)) { seen.add(a.login); const o = document.createElement('option'); o.value = a.login; o.textContent = a.login; sel.appendChild(o); }
    }));

    document.getElementById('repoInfo').style.display = 'flex';
    document.getElementById('repoInfoText').textContent = `${allIssues.length} issues loaded`;
    applyFilters();
  } catch(e) {
    list.innerHTML = `<div class="error-bar">Error: ${e.message}. Check your token and repo access.</div>`;
  }
}

async function loadMore() {
  page++;
  try {
    const { data, link } = await ghFetch(`/issues?state=all&per_page=50&page=${page}`);
    const newIssues = data.filter(i => !i.pull_request);
    allIssues = allIssues.concat(newIssues);
    hasMore = link.includes('rel="next"');
    document.getElementById('allCount').textContent = allIssues.length;
    document.getElementById('openCount').textContent = allIssues.filter(i=>i.state==='open').length;
    document.getElementById('closedCount').textContent = allIssues.filter(i=>i.state==='closed').length;
    applyFilters();
  } catch(e) { alert('Failed to load more: ' + e.message); }
}

async function loadDetail(num) {
  currentIssue = num;
  applyFilters();
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div class="loader" style="padding:60px;"><div class="spinner"></div></div>';
  try {
    const [{ data: issue }, { data: comments }] = await Promise.all([
      ghFetch(`/issues/${num}`),
      ghFetch(`/issues/${num}/comments?per_page=50`)
    ]);

    const assigneesHtml = (issue.assignees||[]).length
      ? (issue.assignees||[]).map(a => `
          <div class="assignee-card">
            <img class="avatar-md" src="${a.avatar_url}" />
            <span class="assignee-login">${a.login}</span>
          </div>`).join('')
      : '<span style="font-size:12px;color:var(--muted);">Unassigned</span>';

    const labelsHtml = (issue.labels||[]).map(l =>
      `<span class="issue-label" style="${labelStyle(l.color)};padding:3px 8px;border-radius:20px;font-size:11px;">${l.name}</span>`
    ).join('');

    const commentsHtml = comments.length
      ? comments.map(c => `
          <div class="comment-card">
            <div class="comment-header">
              <img class="avatar-sm" src="${c.user.avatar_url}" style="width:24px;height:24px;" />
              <span class="comment-author">${c.user.login}</span>
              <span class="comment-time">${timeAgo(c.created_at)}</span>
            </div>
            <div class="comment-body">${renderBody(c.body)}</div>
          </div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;">No comments yet.</div>';

    panel.innerHTML = `
      <div class="detail-content">
        <div class="detail-header">
          <div class="detail-title-row">
            <div class="detail-title">${escHtml(issue.title)}</div>
            <span class="state-badge ${issue.state}">${issue.state === 'open' ? '● Open' : '○ Closed'}</span>
          </div>
          <div class="detail-submeta">#${issue.number} · opened ${timeAgo(issue.created_at)} by ${issue.user.login} · ${issue.comments} comment${issue.comments!==1?'s':''}</div>
          ${labelsHtml ? `<div class="detail-labels">${labelsHtml}</div>` : ''}
        </div>

        <div class="sidebar-meta">
          <div class="meta-block">
            <div class="section-title">Assignees</div>
            <div style="display:flex;flex-direction:column;gap:6px;">${assigneesHtml}</div>
          </div>
          ${issue.milestone ? `
          <div class="meta-block">
            <div class="section-title">Milestone</div>
            <div style="font-size:13px;color:var(--amber);">⚑ ${issue.milestone.title}</div>
          </div>` : ''}
          <div class="meta-block">
            <div class="section-title">Activity</div>
            <div style="font-size:12px;color:var(--muted);font-family:var(--font-mono);">
              Created ${timeAgo(issue.created_at)}<br/>
              Updated ${timeAgo(issue.updated_at)}
            </div>
          </div>
        </div>

        <div class="section-title">Description</div>
        <div class="detail-body">${renderBody(issue.body)}</div>

        <div class="comments-section">
          <div class="section-title">${comments.length} Comment${comments.length!==1?'s':''}</div>
          ${commentsHtml}
        </div>
      </div>`;
  } catch(e) {
    panel.innerHTML = `<div style="padding:32px;"><div class="error-bar">Failed to load issue: ${e.message}</div></div>`;
  }
}

document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
</script>
</body>
</html>
